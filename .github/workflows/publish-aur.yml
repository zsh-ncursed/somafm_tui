name: Publish to AUR

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Run tests before publishing to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv libmpv-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Verify PKGBUILD includes all Python files
        run: |
          chmod +x scripts/verify-pkgbuild.sh
          ./scripts/verify-pkgbuild.sh

  publish-aur:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Validate PKGBUILD
        run: |
          # Check if PKGBUILD exists
          if [ ! -f "PKGBUILD" ]; then
            echo "Error: PKGBUILD not found"
            exit 1
          fi
          echo "PKGBUILD found"
          # Update pkgver in PKGBUILD for AUR action compatibility
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          echo "Updated pkgver to $VERSION"
          grep "^pkgver" PKGBUILD
          
          # Update sha256sums for the new tarball
          # Download tarball and compute sha256sum
          echo "Updating sha256sums..."
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz" | sha256sum | awk '{print $1}' > /tmp/sha256sum
          NEW_SHA=$(cat /tmp/sha256sum)
          sed -i "s/^sha256sums=.*/sha256sums=('$NEW_SHA')/" PKGBUILD
          echo "Updated sha256sums to: $NEW_SHA"
          grep "^sha256sums" PKGBUILD

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Test SSH connection
        run: |
          ssh -T -i ~/.ssh/id_ed25519 aur@aur.archlinux.org || echo "SSH test failed"

      - name: Update AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: somafm_tui
          pkgbuild: PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.get_version.outputs.version }}"
          ssh_keyscan_types: rsa,ed25519
          updpkgsums: true
          test: true
          test_flags: --clean --cleanbuild --nodeps --verifysource
