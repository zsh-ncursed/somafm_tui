name: Publish to AUR

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-aur:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Validate PKGBUILD
        run: |
          # Check if PKGBUILD exists
          if [ ! -f "PKGBUILD" ]; then
            echo "Error: PKGBUILD not found"
            exit 1
          fi
          echo "PKGBUILD found"
          # Inject version into PKGBUILD for AUR action compatibility
          echo "pkgver=${{ steps.get_version.outputs.version }}" >> PKGBUILD

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Test SSH connection
        run: |
          ssh -T -i ~/.ssh/id_ed25519 aur@aur.archlinux.org || echo "SSH test failed"

      - name: Update AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: somafm_tui
          pkgbuild: PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.get_version.outputs.version }}"
          ssh_keyscan_types: rsa,ed25519
          updpkgsums: true
          test: true
          test_flags: --clean --cleanbuild --nodeps --verifysource
