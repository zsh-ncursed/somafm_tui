name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Запуск тестов при создании релиза
  release:
    types: [created]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv libmpv-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Check Python syntax
        run: |
          python -m py_compile somafm_tui/*.py

      - name: Verify package structure
        run: |
          pip install -e .
          python -c "from somafm_tui.player import SomaFMPlayer; print('OK')"

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests with coverage report
        run: |
          pytest tests/ --cov=somafm_tui --cov-report=term-missing --cov-fail-under=60
        continue-on-error: true

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
